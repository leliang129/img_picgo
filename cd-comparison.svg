<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 660 200">
  <rect width="660" height="200" rx="8" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>

  <defs>
    <marker id="cd" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto">
      <path d="M0,1 L9,5 L0,9" fill="#64748b"/>
    </marker>
  </defs>

  <text x="330" y="24" text-anchor="middle" fill="#334155" font-family="sans-serif" font-size="14" font-weight="bold">CD：持续交付 vs 持续部署</text>

  <!-- Delivery -->
  <text x="330" y="48" text-anchor="middle" fill="#3b82f6" font-family="sans-serif" font-size="12" font-weight="bold">Continuous Delivery（持续交付）</text>
  <rect x="30" y="58" width="90" height="36" rx="6" fill="#22c55e"/>
  <text x="75" y="81" text-anchor="middle" fill="white" font-family="sans-serif" font-size="12" font-weight="bold">CI 通过</text>

  <line x1="120" y1="76" x2="155" y2="76" stroke="#64748b" stroke-width="1.5" marker-end="url(#cd)"/>

  <rect x="160" y="58" width="110" height="36" rx="6" fill="#f59e0b"/>
  <text x="215" y="81" text-anchor="middle" fill="white" font-family="sans-serif" font-size="11" font-weight="bold">人工确认</text>

  <line x1="270" y1="76" x2="305" y2="76" stroke="#64748b" stroke-width="1.5" marker-end="url(#cd)"/>

  <rect x="310" y="58" width="100" height="36" rx="6" fill="#ef4444"/>
  <text x="360" y="81" text-anchor="middle" fill="white" font-family="sans-serif" font-size="12" font-weight="bold">部署生产</text>

  <text x="180" y="112" text-anchor="middle" fill="#64748b" font-family="sans-serif" font-size="9">手动触发 / 审批</text>

  <!-- Deployment -->
  <text x="330" y="140" text-anchor="middle" fill="#8b5cf6" font-family="sans-serif" font-size="12" font-weight="bold">Continuous Deployment（持续部署）</text>
  <rect x="30" y="150" width="90" height="36" rx="6" fill="#22c55e"/>
  <text x="75" y="173" text-anchor="middle" fill="white" font-family="sans-serif" font-size="12" font-weight="bold">CI 通过</text>

  <line x1="120" y1="168" x2="170" y2="168" stroke="#64748b" stroke-width="1.5" marker-end="url(#cd)"/>

  <rect x="175" y="150" width="120" height="36" rx="6" fill="#06b6d4"/>
  <text x="235" y="173" text-anchor="middle" fill="white" font-family="sans-serif" font-size="12" font-weight="bold">自动部署生产</text>

  <text x="230" y="198" text-anchor="middle" fill="#64748b" font-family="sans-serif" font-size="9">无需人工干预</text>

  <!-- Arrow between -->
  <text x="490" y="100" text-anchor="middle" fill="#64748b" font-family="sans-serif" font-size="11">← 多了人工确认环节</text>
  <line x1="490" y1="110" x2="490" y2="148" stroke="#94a3b8" stroke-width="1" stroke-dasharray="4,2"/>
</svg>
