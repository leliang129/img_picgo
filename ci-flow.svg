<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 650 220">
  <rect width="650" height="220" rx="8" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
  <text x="325" y="26" text-anchor="middle" fill="#334155" font-family="sans-serif" font-size="14" font-weight="bold">CI 持续集成流程</text>

  <defs>
    <marker id="ci" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto">
      <path d="M0,1 L9,5 L0,9" fill="#64748b"/>
    </marker>
    <marker id="cif" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto">
      <path d="M0,1 L9,5 L0,9" fill="#ef4444"/>
    </marker>
  </defs>

  <!-- Developer Push -->
  <rect x="30" y="55" width="110" height="40" rx="6" fill="#1e293b"/>
  <text x="85" y="80" text-anchor="middle" fill="white" font-family="sans-serif" font-size="12" font-weight="bold">开发者 Push</text>

  <line x1="140" y1="75" x2="175" y2="75" stroke="#64748b" stroke-width="1.5" marker-end="url(#ci)"/>

  <!-- Build -->
  <rect x="180" y="55" width="110" height="40" rx="6" fill="#3b82f6"/>
  <text x="235" y="80" text-anchor="middle" fill="white" font-family="sans-serif" font-size="12" font-weight="bold">自动构建</text>

  <line x1="290" y1="75" x2="325" y2="75" stroke="#64748b" stroke-width="1.5" marker-end="url(#ci)"/>

  <!-- Test -->
  <rect x="330" y="55" width="110" height="40" rx="6" fill="#22c55e"/>
  <text x="385" y="80" text-anchor="middle" fill="white" font-family="sans-serif" font-size="12" font-weight="bold">自动测试</text>

  <line x1="440" y1="75" x2="475" y2="75" stroke="#64748b" stroke-width="1.5" marker-end="url(#ci)"/>

  <!-- Result -->
  <rect x="480" y="55" width="110" height="40" rx="6" fill="#8b5cf6"/>
  <text x="535" y="80" text-anchor="middle" fill="white" font-family="sans-serif" font-size="12" font-weight="bold">反馈结果</text>

  <!-- Success path -->
  <line x1="535" y1="95" x2="535" y2="125" stroke="#22c55e" stroke-width="1.5"/>
  <line x1="535" y1="125" x2="85" y2="125" stroke="#22c55e" stroke-width="1.5"/>
  <line x1="85" y1="125" x2="85" y2="95" stroke="#22c55e" stroke-width="1.5"/>
  <text x="310" y="140" text-anchor="middle" fill="#16a34a" font-family="sans-serif" font-size="11">✅ 成功 → 代码可合并，主干保持可发布</text>

  <!-- Failure path -->
  <line x1="475" y1="80" x2="460" y2="80" stroke="#ef4444" stroke-width="1.5"/>
  <line x1="460" y1="80" x2="460" y2="170" stroke="#ef4444" stroke-width="1.5"/>
  <line x1="460" y1="170" x2="235" y2="170" stroke="#ef4444" stroke-width="1.5" marker-end="url(#cif)"/>
  <text x="350" y="185" text-anchor="middle" fill="#dc2626" font-family="sans-serif" font-size="11">❌ 失败 → 立即反馈给开发者修复</text>

  <!-- Labels -->
  <text x="85" y="110" text-anchor="middle" fill="#64748b" font-family="sans-serif" font-size="9">Git Push</text>
  <text x="235" y="110" text-anchor="middle" fill="#64748b" font-family="sans-serif" font-size="9">Maven / Docker</text>
  <text x="385" y="110" text-anchor="middle" fill="#64748b" font-family="sans-serif" font-size="9">单测 / 集成 / 扫描</text>
  <text x="535" y="110" text-anchor="middle" fill="#64748b" font-family="sans-serif" font-size="9">&lt; 10 分钟</text>
</svg>
