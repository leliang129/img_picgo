<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 170">
  <rect width="720" height="170" rx="8" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
  <text x="360" y="26" text-anchor="middle" fill="#334155" font-family="sans-serif" font-size="14" font-weight="bold">CI/CD 流水线</text>

  <defs>
    <marker id="ca" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto">
      <path d="M0,1 L9,5 L0,9" fill="#64748b"/>
    </marker>
  </defs>

  <!-- Commit -->
  <rect x="15" y="55" width="85" height="40" rx="6" fill="#1e293b"/>
  <text x="57" y="80" text-anchor="middle" fill="white" font-family="monospace" font-size="11" font-weight="bold">Commit</text>
  <line x1="100" y1="75" x2="130" y2="75" stroke="#64748b" stroke-width="1.5" marker-end="url(#ca)"/>

  <!-- Build -->
  <rect x="135" y="55" width="85" height="40" rx="6" fill="#3b82f6"/>
  <text x="177" y="80" text-anchor="middle" fill="white" font-family="monospace" font-size="11" font-weight="bold">Build</text>
  <line x1="220" y1="75" x2="250" y2="75" stroke="#64748b" stroke-width="1.5" marker-end="url(#ca)"/>

  <!-- Test -->
  <rect x="255" y="55" width="85" height="40" rx="6" fill="#22c55e"/>
  <text x="297" y="80" text-anchor="middle" fill="white" font-family="monospace" font-size="11" font-weight="bold">Test</text>
  <line x1="340" y1="75" x2="370" y2="75" stroke="#64748b" stroke-width="1.5" marker-end="url(#ca)"/>

  <!-- Scan -->
  <rect x="375" y="55" width="85" height="40" rx="6" fill="#f59e0b"/>
  <text x="417" y="80" text-anchor="middle" fill="white" font-family="monospace" font-size="11" font-weight="bold">Scan</text>
  <line x1="460" y1="75" x2="490" y2="75" stroke="#64748b" stroke-width="1.5" marker-end="url(#ca)"/>

  <!-- Push -->
  <rect x="495" y="55" width="95" height="40" rx="6" fill="#8b5cf6"/>
  <text x="542" y="80" text-anchor="middle" fill="white" font-family="monospace" font-size="11" font-weight="bold">Push Registry</text>
  <line x1="590" y1="75" x2="625" y2="75" stroke="#64748b" stroke-width="1.5" marker-end="url(#ca)"/>

  <!-- Deploy -->
  <rect x="630" y="55" width="75" height="40" rx="6" fill="#ef4444"/>
  <text x="667" y="80" text-anchor="middle" fill="white" font-family="monospace" font-size="11" font-weight="bold">Deploy</text>

  <!-- Labels below -->
  <text x="57" y="115" text-anchor="middle" fill="#64748b" font-family="sans-serif" font-size="9">Git Push</text>
  <text x="177" y="115" text-anchor="middle" fill="#64748b" font-family="sans-serif" font-size="9">Docker/Maven</text>
  <text x="297" y="115" text-anchor="middle" fill="#64748b" font-family="sans-serif" font-size="9">单测/集成</text>
  <text x="417" y="115" text-anchor="middle" fill="#64748b" font-family="sans-serif" font-size="9">漏洞/质量</text>
  <text x="542" y="115" text-anchor="middle" fill="#64748b" font-family="sans-serif" font-size="9">Harbor/Nexus</text>
  <text x="667" y="115" text-anchor="middle" fill="#64748b" font-family="sans-serif" font-size="9">K8s/VM</text>

  <!-- CI / CD divider -->
  <text x="490" y="155" text-anchor="middle" fill="#94a3b8" font-family="sans-serif" font-size="11">← CI（持续集成） → ︎ ← CD（持续交付/部署）→</text>
</svg>
