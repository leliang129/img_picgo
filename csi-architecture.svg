<svg width="980" height="620" viewBox="0 0 980 620" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="980" y2="620" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFF7ED"/>
      <stop offset="1" stop-color="#EFF6FF"/>
    </linearGradient>
    <linearGradient id="orange" x1="0" y1="0" x2="0" y2="1">
      <stop stop-color="#F97316"/>
      <stop offset="1" stop-color="#FDBA74"/>
    </linearGradient>
    <linearGradient id="blue" x1="0" y1="0" x2="0" y2="1">
      <stop stop-color="#0EA5E9"/>
      <stop offset="1" stop-color="#7DD3FC"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="12" flood-color="#64748B" flood-opacity="0.18"/>
    </filter>
    <style>
      .title { font: 700 28px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif; fill: #0F172A; }
      .text { font: 500 18px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif; fill: #334155; }
      .small { font: 500 16px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif; fill: #475569; }
      .label { font: 700 15px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif; fill: #0F172A; }
      .pill { font: 700 14px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif; fill: white; }
    </style>
  </defs>

  <rect width="980" height="620" rx="28" fill="url(#bg)"/>
  <text x="44" y="60" class="title">CSI 驱动典型部署结构</text>
  <text x="44" y="92" class="text">控制面侧负责卷管理，节点侧负责实际挂载；sidecar 负责把 Kubernetes 事件翻译成对驱动的调用。</text>

  <rect x="42" y="140" width="896" height="424" rx="24" fill="white" filter="url(#shadow)"/>

  <rect x="78" y="178" width="364" height="334" rx="24" fill="#FFF7ED" stroke="#FDBA74" stroke-width="2"/>
  <rect x="102" y="198" width="154" height="30" rx="15" fill="url(#orange)"/>
  <text x="141" y="218" class="pill">控制面侧</text>
  <text x="102" y="258" class="text">Deployment / StatefulSet</text>
  <rect x="102" y="286" width="142" height="40" rx="14" fill="#FFEDD5"/>
  <text x="124" y="311" class="label">external-provisioner</text>
  <rect x="260" y="286" width="126" height="40" rx="14" fill="#FFEDD5"/>
  <text x="286" y="311" class="label">external-attacher</text>
  <rect x="102" y="340" width="124" height="40" rx="14" fill="#FFEDD5"/>
  <text x="130" y="365" class="label">resizer</text>
  <rect x="242" y="340" width="144" height="40" rx="14" fill="#FFEDD5"/>
  <text x="264" y="365" class="label">snapshotter</text>
  <rect x="102" y="412" width="284" height="62" rx="18" fill="#F97316" fill-opacity="0.14" stroke="#F97316"/>
  <text x="138" y="447" class="label">CSI Controller</text>
  <text x="138" y="470" class="small">Create / Delete / Attach / Snapshot</text>

  <rect x="536" y="178" width="364" height="334" rx="24" fill="#EFF6FF" stroke="#7DD3FC" stroke-width="2"/>
  <rect x="560" y="198" width="154" height="30" rx="15" fill="url(#blue)"/>
  <text x="599" y="218" class="pill">节点侧</text>
  <text x="560" y="258" class="text">DaemonSet</text>
  <rect x="560" y="286" width="170" height="40" rx="14" fill="#E0F2FE"/>
  <text x="583" y="311" class="label">node-driver-registrar</text>
  <rect x="560" y="358" width="304" height="62" rx="18" fill="#0EA5E9" fill-opacity="0.14" stroke="#0EA5E9"/>
  <text x="596" y="393" class="label">CSI Node</text>
  <text x="596" y="416" class="small">Stage / Publish / Unpublish / Stats</text>
  <rect x="560" y="446" width="170" height="40" rx="14" fill="#DBEAFE"/>
  <text x="600" y="471" class="label">kubelet 调用挂载</text>

  <path d="M442 442H536" stroke="#F97316" stroke-width="4" stroke-linecap="round"/>
  <path d="M520 432L536 442L520 452" stroke="#F97316" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="432" y="408" class="small">卷已准备好后交给节点侧使用</text>

  <rect x="344" y="534" width="290" height="36" rx="18" fill="#0F172A"/>
  <text x="387" y="557" class="pill">最终把卷挂到 Pod 实际使用的目录</text>
</svg>
