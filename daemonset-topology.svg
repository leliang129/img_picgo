<svg width="1280" height="760" viewBox="0 0 1280 760" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1280" height="760" rx="28" fill="#F8FAFC"/>
  <text x="640" y="74" text-anchor="middle" fill="#0F172A" font-size="30" font-family="Arial, sans-serif" font-weight="700">DaemonSet 拓扑结构</text>
  <text x="640" y="110" text-anchor="middle" fill="#475569" font-size="16" font-family="Arial, sans-serif">在每个符合条件的节点上维持一个 Pod 副本，适合日志、监控和网络插件</text>
  <defs>
    <marker id="arrow-ds" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0 0L10 5L0 10Z" fill="#FB923C"/>
    </marker>
  </defs>
  <rect x="460" y="150" width="360" height="92" rx="22" fill="#FFF7ED" stroke="#EA580C" stroke-width="3"/>
  <text x="640" y="192" text-anchor="middle" fill="#9A3412" font-size="24" font-family="Arial, sans-serif" font-weight="700">DaemonSet</text>
  <text x="640" y="224" text-anchor="middle" fill="#7C2D12" font-size="16" font-family="Arial, sans-serif">为每个节点维持一个守护进程副本</text>
  <path d="M640 242V300" stroke="#FB923C" stroke-width="4" marker-end="url(#arrow-ds)"/>
  <g>
    <rect x="100" y="330" width="300" height="250" rx="24" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="2"/>
    <text x="250" y="372" text-anchor="middle" fill="#0F172A" font-size="22" font-family="Arial, sans-serif" font-weight="700">Node A</text>
    <rect x="170" y="420" width="160" height="88" rx="20" fill="#FDBA74"/>
    <text x="250" y="472" text-anchor="middle" fill="#7C2D12" font-size="20" font-family="Arial, sans-serif" font-weight="700">Pod</text>
    <text x="250" y="542" text-anchor="middle" fill="#475569" font-size="15" font-family="Arial, sans-serif">例如 node-exporter / fluentd</text>
    <rect x="490" y="330" width="300" height="250" rx="24" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="2"/>
    <text x="640" y="372" text-anchor="middle" fill="#0F172A" font-size="22" font-family="Arial, sans-serif" font-weight="700">Node B</text>
    <rect x="560" y="420" width="160" height="88" rx="20" fill="#FDBA74"/>
    <text x="640" y="472" text-anchor="middle" fill="#7C2D12" font-size="20" font-family="Arial, sans-serif" font-weight="700">Pod</text>
    <text x="640" y="542" text-anchor="middle" fill="#475569" font-size="15" font-family="Arial, sans-serif">节点加入后自动创建</text>
    <rect x="880" y="330" width="300" height="250" rx="24" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="2"/>
    <text x="1030" y="372" text-anchor="middle" fill="#0F172A" font-size="22" font-family="Arial, sans-serif" font-weight="700">Node C</text>
    <rect x="950" y="420" width="160" height="88" rx="20" fill="#FDBA74"/>
    <text x="1030" y="472" text-anchor="middle" fill="#7C2D12" font-size="20" font-family="Arial, sans-serif" font-weight="700">Pod</text>
    <text x="1030" y="542" text-anchor="middle" fill="#475569" font-size="15" font-family="Arial, sans-serif">节点移除时 Pod 也会清理</text>
  </g>
  <path d="M640 300L250 330" stroke="#FB923C" stroke-width="4" marker-end="url(#arrow-ds)"/>
  <path d="M640 300V330" stroke="#FB923C" stroke-width="4" marker-end="url(#arrow-ds)"/>
  <path d="M640 300L1030 330" stroke="#FB923C" stroke-width="4" marker-end="url(#arrow-ds)"/>
</svg>
