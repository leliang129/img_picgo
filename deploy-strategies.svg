<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 350">
  <rect width="700" height="350" rx="8" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
  <text x="350" y="26" text-anchor="middle" fill="#334155" font-family="sans-serif" font-size="14" font-weight="bold">部署策略对比</text>

  <!-- 1. Rolling -->
  <text x="30" y="55" fill="#1e40af" font-family="sans-serif" font-size="12" font-weight="bold">滚动更新</text>
  <rect x="30" y="65" width="60" height="30" rx="4" fill="#22c55e" opacity="0.7"/>
  <text x="60" y="85" text-anchor="middle" fill="white" font-family="sans-serif" font-size="10">v2 Pod1</text>
  <rect x="100" y="65" width="60" height="30" rx="4" fill="#3b82f6" opacity="0.7"/>
  <text x="130" y="85" text-anchor="middle" fill="white" font-family="sans-serif" font-size="10">v1 Pod2</text>
  <rect x="170" y="65" width="60" height="30" rx="4" fill="#3b82f6" opacity="0.7"/>
  <text x="200" y="85" text-anchor="middle" fill="white" font-family="sans-serif" font-size="10">v1 Pod3</text>
  <text x="30" y="112" fill="#64748b" font-family="sans-serif" font-size="9">逐步替换 Pod</text>

  <!-- 2. Blue-Green -->
  <text x="30" y="145" fill="#1e40af" font-family="sans-serif" font-size="12" font-weight="bold">蓝绿部署</text>
  <rect x="30" y="155" width="90" height="30" rx="4" fill="#3b82f6"/>
  <text x="75" y="175" text-anchor="middle" fill="white" font-family="sans-serif" font-size="10">Blue v1（生产）</text>
  <rect x="130" y="155" width="90" height="30" rx="4" fill="#22c55e" opacity="0.5"/>
  <text x="175" y="175" text-anchor="middle" fill="white" font-family="sans-serif" font-size="10">Green v2（待切）</text>
  <line x1="75" y1="195" x2="75" y2="210" stroke="#ef4444" stroke-width="1.5"/>
  <line x1="75" y1="210" x2="175" y2="210" stroke="#22c55e" stroke-width="1.5" marker-end="url(#dsa)"/>
  <text x="125" y="208" text-anchor="middle" fill="#64748b" font-family="sans-serif" font-size="8">流量切换</text>
  <text x="30" y="230" fill="#64748b" font-family="sans-serif" font-size="9">秒级切换/秒级回滚</text>

  <!-- 3. Canary -->
  <text x="30" y="262" fill="#1e40af" font-family="sans-serif" font-size="12" font-weight="bold">金丝雀发布</text>
  <rect x="30" y="272" width="100" height="30" rx="4" fill="#3b82f6"/>
  <text x="80" y="292" text-anchor="middle" fill="white" font-family="sans-serif" font-size="9">v1（90% 流量）</text>
  <rect x="140" y="272" width="100" height="30" rx="4" fill="#22c55e" opacity="0.6"/>
  <text x="190" y="292" text-anchor="middle" fill="white" font-family="sans-serif" font-size="9">v2（10% 流量）</text>
  <text x="30" y="322" fill="#64748b" font-family="sans-serif" font-size="9">小比例真实流量验证后全量</text>

  <!-- Right side: Feature Flags -->
  <text x="400" y="55" fill="#1e40af" font-family="sans-serif" font-size="12" font-weight="bold">功能开关</text>
  <rect x="400" y="65" width="270" height="50" rx="6" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1"/>
  <text x="535" y="85" text-anchor="middle" fill="#475569" font-family="monospace" font-size="10">if flag("new_ui"):</text>
  <text x="535" y="102" text-anchor="middle" fill="#475569" font-family="monospace" font-size="10">    serve_new_ui()</text>

  <text x="400" y="145" fill="#1e40af" font-family="sans-serif" font-size="12" font-weight="bold">选型建议</text>
  <rect x="400" y="155" width="270" height="80" rx="6" fill="#eff6ff"/>
  <text x="415" y="175" fill="#475569" font-family="sans-serif" font-size="10">简单 Web → 滚动更新</text>
  <text x="415" y="195" fill="#475569" font-family="sans-serif" font-size="10">核心交易 → 蓝绿</text>
  <text x="415" y="215" fill="#475569" font-family="sans-serif" font-size="10">大流量服务 → 金丝雀</text>
  <text x="415" y="235" fill="#475569" font-family="sans-serif" font-size="10">SaaS 产品 → 功能开关 + 滚动</text>

  <text x="400" y="272" fill="#1e40af" font-family="sans-serif" font-size="12" font-weight="bold">发布前必须</text>
  <rect x="400" y="282" width="270" height="55" rx="6" fill="#fef2f2"/>
  <text x="415" y="300" fill="#991b1b" font-family="sans-serif" font-size="10">☐ 健康检查已配置</text>
  <text x="415" y="318" fill="#991b1b" font-family="sans-serif" font-size="10">☐ 回滚方案已就绪</text>
  <text x="415" y="336" fill="#991b1b" font-family="sans-serif" font-size="10">☐ DB 变更向前兼容（先加后删）</text>

  <defs>
    <marker id="dsa" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto">
      <path d="M0,1 L9,5 L0,9" fill="#22c55e"/>
    </marker>
  </defs>
</svg>
