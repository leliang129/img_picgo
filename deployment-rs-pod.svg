<svg width="1200" height="680" viewBox="0 0 1200 680" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="680" rx="28" fill="#F8FAFC"/>
  <text x="600" y="70" text-anchor="middle" fill="#0F172A" font-size="30" font-family="Arial, sans-serif" font-weight="700">Deployment → ReplicaSet → Pod</text>
  <text x="600" y="108" text-anchor="middle" fill="#475569" font-size="16" font-family="Arial, sans-serif">Deployment 不直接控制 Pod，而是通过管理 ReplicaSet 间接完成发布与副本管理</text>
  <defs>
    <marker id="arrow-deploy" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0 0L10 5L0 10Z" fill="#FB923C"/>
    </marker>
  </defs>
  <rect x="430" y="160" width="340" height="92" rx="22" fill="#FFF7ED" stroke="#EA580C" stroke-width="3"/>
  <text x="600" y="202" text-anchor="middle" fill="#9A3412" font-size="24" font-family="Arial, sans-serif" font-weight="700">Deployment</text>
  <text x="600" y="234" text-anchor="middle" fill="#7C2D12" font-size="16" font-family="Arial, sans-serif">声明发布策略、版本与目标副本数</text>
  <path d="M600 252V314" stroke="#FB923C" stroke-width="4" marker-end="url(#arrow-deploy)"/>
  <rect x="260" y="330" width="280" height="96" rx="22" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="2"/>
  <text x="400" y="372" text-anchor="middle" fill="#0F172A" font-size="22" font-family="Arial, sans-serif" font-weight="700">旧 ReplicaSet</text>
  <text x="400" y="404" text-anchor="middle" fill="#475569" font-size="16" font-family="Arial, sans-serif">revision=1 / replicas=0~N</text>
  <rect x="660" y="330" width="280" height="96" rx="22" fill="#FFF7ED" stroke="#EA580C" stroke-width="3"/>
  <text x="800" y="372" text-anchor="middle" fill="#9A3412" font-size="22" font-family="Arial, sans-serif" font-weight="700">新 ReplicaSet</text>
  <text x="800" y="404" text-anchor="middle" fill="#7C2D12" font-size="16" font-family="Arial, sans-serif">revision=2 / replicas=0~N</text>
  <path d="M400 426V492" stroke="#94A3B8" stroke-width="4" marker-end="url(#arrow-deploy)"/>
  <path d="M800 426V492" stroke="#FB923C" stroke-width="4" marker-end="url(#arrow-deploy)"/>
  <g>
    <rect x="180" y="520" width="140" height="70" rx="18" fill="#E2E8F0"/>
    <text x="250" y="562" text-anchor="middle" fill="#475569" font-size="20" font-family="Arial, sans-serif" font-weight="700">Pod</text>
    <rect x="340" y="520" width="140" height="70" rx="18" fill="#E2E8F0"/>
    <text x="410" y="562" text-anchor="middle" fill="#475569" font-size="20" font-family="Arial, sans-serif" font-weight="700">Pod</text>
    <rect x="500" y="520" width="140" height="70" rx="18" fill="#E2E8F0"/>
    <text x="570" y="562" text-anchor="middle" fill="#475569" font-size="20" font-family="Arial, sans-serif" font-weight="700">Pod</text>
    <rect x="660" y="520" width="140" height="70" rx="18" fill="#FDBA74"/>
    <text x="730" y="562" text-anchor="middle" fill="#7C2D12" font-size="20" font-family="Arial, sans-serif" font-weight="700">Pod</text>
    <rect x="820" y="520" width="140" height="70" rx="18" fill="#FDBA74"/>
    <text x="890" y="562" text-anchor="middle" fill="#7C2D12" font-size="20" font-family="Arial, sans-serif" font-weight="700">Pod</text>
    <rect x="980" y="520" width="140" height="70" rx="18" fill="#FDBA74"/>
    <text x="1050" y="562" text-anchor="middle" fill="#7C2D12" font-size="20" font-family="Arial, sans-serif" font-weight="700">Pod</text>
  </g>
</svg>
