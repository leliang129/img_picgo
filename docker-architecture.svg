<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 320">
  <defs>
    <linearGradient id="header" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0ea5e9"/>
      <stop offset="100%" stop-color="#0284c7"/>
    </linearGradient>
  </defs>
  <rect width="680" height="320" rx="8" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>

  <!-- Docker Client -->
  <rect x="40" y="20" width="600" height="50" rx="6" fill="url(#header)"/>
  <text x="340" y="50" text-anchor="middle" fill="white" font-family="monospace" font-size="14" font-weight="bold">Docker Client（docker build / run / push ...）</text>

  <text x="340" y="100" text-anchor="middle" fill="#64748b" font-family="sans-serif" font-size="12">↕ REST API / Unix Socket</text>

  <!-- Docker Daemon -->
  <rect x="40" y="115" width="600" height="50" rx="6" fill="#0ea5e9" opacity="0.85"/>
  <text x="340" y="145" text-anchor="middle" fill="white" font-family="monospace" font-size="14" font-weight="bold">Docker Daemon（dockerd）</text>

  <!-- Subcomponents -->
  <rect x="80" y="185" width="250" height="40" rx="5" fill="#38bdf8" opacity="0.7"/>
  <text x="205" y="210" text-anchor="middle" fill="white" font-family="monospace" font-size="12">containerd</text>

  <rect x="370" y="185" width="250" height="40" rx="5" fill="#7dd3fc" opacity="0.7"/>
  <text x="495" y="210" text-anchor="middle" fill="#0c4a6e" font-family="monospace" font-size="12">runc</text>

  <text x="205" y="250" text-anchor="middle" fill="#64748b" font-family="sans-serif" font-size="11">镜像管理、容器生命周期</text>
  <text x="495" y="250" text-anchor="middle" fill="#64748b" font-family="sans-serif" font-size="11">OCI 运行时，实际创建容器</text>

  <!-- Kernel -->
  <rect x="40" y="270" width="600" height="35" rx="6" fill="#1e293b"/>
  <text x="340" y="293" text-anchor="middle" fill="#94a3b8" font-family="sans-serif" font-size="13">Linux 内核（namespace · cgroup · unionFS）</text>
</svg>
