<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 580 200">
  <rect width="580" height="200" rx="8" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>

  <text x="290" y="30" text-anchor="middle" fill="#334155" font-family="sans-serif" font-size="15" font-weight="bold">容器生命周期</text>

  <!-- created -->
  <rect x="20" y="55" width="80" height="36" rx="6" fill="#e2e8f0" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="60" y="78" text-anchor="middle" fill="#475569" font-family="sans-serif" font-size="12">created</text>

  <!-- Arrow -->
  <line x1="100" y1="73" x2="145" y2="73" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- running (accent) -->
  <rect x="150" y="55" width="90" height="36" rx="6" fill="#22c55e" opacity="0.85"/>
  <text x="195" y="78" text-anchor="middle" fill="white" font-family="sans-serif" font-size="12" font-weight="bold">running</text>

  <!-- Arrow to paused -->
  <line x1="240" y1="65" x2="240" y2="40" stroke="#94a3b8" stroke-width="1.5"/>
  <line x1="240" y1="40" x2="305" y2="40" stroke="#94a3b8" stroke-width="1.5"/>
  <line x1="305" y1="40" x2="305" y2="55" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- paused -->
  <rect x="280" y="55" width="80" height="36" rx="6" fill="#fbbf24" opacity="0.7"/>
  <text x="320" y="78" text-anchor="middle" fill="#92400e" font-family="sans-serif" font-size="12">paused</text>

  <!-- Arrow paused to running -->
  <line x1="320" y1="91" x2="320" y2="110" stroke="#94a3b8" stroke-width="1.5"/>
  <line x1="320" y1="110" x2="195" y2="110" stroke="#94a3b8" stroke-width="1.5"/>
  <line x1="195" y1="110" x2="195" y2="91" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Arrow running to stopped -->
  <line x1="195" y1="91" x2="195" y2="160" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- stopped -->
  <rect x="145" y="165" width="100" height="36" rx="6" fill="#ef4444" opacity="0.75"/>
  <text x="195" y="188" text-anchor="middle" fill="white" font-family="sans-serif" font-size="12">stopped</text>

  <!-- restart arrow -->
  <line x1="145" y1="195" x2="20" y2="195" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="5,3"/>
  <line x1="20" y1="195" x2="20" y2="78" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="82" y="210" text-anchor="middle" fill="#94a3b8" font-family="sans-serif" font-size="10">restart</text>

  <!-- deleted -->
  <rect x="440" y="160" width="120" height="36" rx="6" fill="#cbd5e1" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="500" y="183" text-anchor="middle" fill="#475569" font-family="sans-serif" font-size="12">deleted</text>

  <!-- Arrow stopped to deleted -->
  <line x1="245" y1="183" x2="440" y2="183" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <text x="290" y="175" text-anchor="middle" fill="#64748b" font-family="sans-serif" font-size="10">docker rm</text>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,1 L9,5 L0,9" fill="#94a3b8"/>
    </marker>
  </defs>
</svg>
