<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 620 300">
  <rect width="620" height="300" rx="8" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>

  <!-- bootfs -->
  <rect x="120" y="240" width="420" height="45" rx="5" fill="#e2e8f0"/>
  <text x="330" y="268" text-anchor="middle" fill="#64748b" font-family="sans-serif" font-size="12">bootfs（内核相关）</text>

  <!-- base layer -->
  <rect x="100" y="195" width="460" height="45" rx="5" fill="#bfdbfe"/>
  <text x="160" y="222" fill="#1e40af" font-family="monospace" font-size="12">FROM python:3.11-alpine</text>
  <text x="440" y="222" text-anchor="end" fill="#1e40af" font-family="sans-serif" font-size="11">~7MB</text>

  <!-- deps layer -->
  <rect x="80" y="150" width="500" height="45" rx="5" fill="#93c5fd"/>
  <text x="155" y="177" fill="#1e3a5f" font-family="monospace" font-size="12">RUN pip install -r requirements.txt</text>
  <text x="455" y="177" text-anchor="end" fill="#1e3a5f" font-family="sans-serif" font-size="11">~5MB</text>

  <!-- app layer -->
  <rect x="60" y="105" width="540" height="45" rx="5" fill="#60a5fa"/>
  <text x="150" y="132" fill="white" font-family="monospace" font-size="12">COPY app.jar /app/</text>
  <text x="470" y="132" text-anchor="end" fill="white" font-family="sans-serif" font-size="11">~10KB</text>

  <!-- Labels -->
  <text x="580" y="115" fill="#3b82f6" font-family="sans-serif" font-size="10">← 只读层（Image Layers）</text>

  <!-- Container RW layer -->
  <rect x="60" y="70" width="540" height="35" rx="5" fill="#fbbf24" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="330" y="93" text-anchor="middle" fill="#92400e" font-family="monospace" font-size="12" font-weight="bold">容器读写层（Container RW Layer）</text>

  <text x="590" y="80" fill="#f59e0b" font-family="sans-serif" font-size="10">← 可写</text>

  <!-- Title -->
  <text x="310" y="30" text-anchor="middle" fill="#334155" font-family="sans-serif" font-size="15" font-weight="bold">Docker 镜像分层模型</text>
</svg>
