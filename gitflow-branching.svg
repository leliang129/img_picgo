<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 260">
  <rect width="680" height="260" rx="8" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
  <text x="340" y="24" text-anchor="middle" fill="#334155" font-family="sans-serif" font-size="14" font-weight="bold">Git Flow 分支模型</text>

  <!-- main -->
  <text x="20" y="65" fill="#475569" font-family="monospace" font-size="11">main</text>
  <line x1="60" y1="60" x2="640" y2="60" stroke="#ef4444" stroke-width="2"/>
  <circle cx="100" cy="60" r="5" fill="#ef4444"/>
  <circle cx="240" cy="60" r="5" fill="#ef4444"/>
  <circle cx="380" cy="60" r="5" fill="#ef4444"/>
  <circle cx="520" cy="60" r="5" fill="#ef4444"/>
  <circle cx="620" cy="60" r="5" fill="#ef4444"/>

  <!-- release -->
  <text x="20" y="115" fill="#475569" font-family="monospace" font-size="11">release</text>
  <line x1="60" y1="110" x2="640" y2="110" stroke="#f59e0b" stroke-width="2" stroke-dasharray="8,4"/>
  <circle cx="240" cy="110" r="5" fill="#f59e0b"/>
  <circle cx="330" cy="110" r="5" fill="#f59e0b"/>
  <circle cx="520" cy="110" r="5" fill="#f59e0b"/>
  <circle cx="600" cy="110" r="5" fill="#f59e0b"/>
  <!-- merge from main -->
  <line x1="240" y1="60" x2="240" y2="110" stroke="#f59e0b" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="520" y1="60" x2="520" y2="110" stroke="#f59e0b" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- develop -->
  <text x="20" y="155" fill="#475569" font-family="monospace" font-size="11">develop</text>
  <line x1="60" y1="150" x2="640" y2="150" stroke="#3b82f6" stroke-width="2"/>
  <circle cx="80" cy="150" r="5" fill="#3b82f6"/>
  <circle cx="160" cy="150" r="5" fill="#3b82f6"/>
  <circle cx="300" cy="150" r="5" fill="#3b82f6"/>
  <circle cx="440" cy="150" r="5" fill="#3b82f6"/>
  <circle cx="580" cy="150" r="5" fill="#3b82f6"/>

  <!-- feature branches -->
  <text x="20" y="200" fill="#64748b" font-family="monospace" font-size="11">feature</text>
  <line x1="80" y1="150" x2="80" y2="195" stroke="#22c55e" stroke-width="1.5"/>
  <line x1="80" y1="195" x2="160" y2="195" stroke="#22c55e" stroke-width="2"/>
  <circle cx="80" cy="150" r="4" fill="#22c55e"/>
  <circle cx="160" cy="195" r="4" fill="#22c55e"/>

  <line x1="300" y1="150" x2="300" y2="215" stroke="#22c55e" stroke-width="1.5"/>
  <line x1="300" y1="215" x2="440" y2="215" stroke="#22c55e" stroke-width="2"/>
  <circle cx="300" cy="150" r="4" fill="#22c55e"/>
  <circle cx="440" cy="215" r="4" fill="#22c55e"/>

  <!-- Labels -->
  <text x="100" y="200" text-anchor="middle" fill="#16a34a" font-family="sans-serif" font-size="9">feature/user-auth</text>
  <text x="370" y="225" text-anchor="middle" fill="#16a34a" font-family="sans-serif" font-size="9">feature/api-v2</text>

  <!-- hotfix -->
  <line x1="380" y1="60" x2="380" y2="45" stroke="#dc2626" stroke-width="1.5"/>
  <line x1="380" y1="45" x2="460" y2="45" stroke="#dc2626" stroke-width="2"/>
  <circle cx="380" cy="60" r="4" fill="#dc2626"/>
  <circle cx="460" cy="45" r="4" fill="#dc2626"/>
  <text x="420" y="42" text-anchor="middle" fill="#dc2626" font-family="sans-serif" font-size="9">hotfix</text>

  <!-- Merge indicators -->
  <text x="160" y="130" text-anchor="end" fill="#f59e0b" font-family="sans-serif" font-size="8">merge</text>
  <text x="380" y="130" text-anchor="end" fill="#f59e0b" font-family="sans-serif" font-size="8">merge</text>
</svg>
