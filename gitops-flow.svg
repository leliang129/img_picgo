<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 620 340">
  <rect width="620" height="340" rx="8" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
  <text x="310" y="26" text-anchor="middle" fill="#334155" font-family="sans-serif" font-size="14" font-weight="bold">GitOps 工作流</text>

  <defs>
    <marker id="go" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto">
      <path d="M0,1 L9,5 L0,9" fill="#64748b"/>
    </marker>
  </defs>

  <!-- Git Repo -->
  <rect x="190" y="45" width="240" height="55" rx="6" fill="#1e293b"/>
  <text x="310" y="68" text-anchor="middle" fill="white" font-family="monospace" font-size="13" font-weight="bold">Git Repository</text>
  <text x="310" y="86" text-anchor="middle" fill="#94a3b8" font-family="sans-serif" font-size="10">声明式配置（YAML/JSON） — 唯一真相来源</text>

  <line x1="310" y1="100" x2="310" y2="135" stroke="#64748b" stroke-width="1.5" marker-end="url(#go)"/>

  <!-- Git Change -->
  <text x="100" y="30" text-anchor="middle" fill="#64748b" font-family="sans-serif" font-size="10">git commit -m</text>
  <text x="100" y="45" text-anchor="middle" fill="#64748b" font-family="sans-serif" font-size="10">"replicas: 5"</text>
  <line x1="100" y1="55" x2="100" y2="72" stroke="#64748b" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="100" y1="72" x2="190" y2="72" stroke="#64748b" stroke-width="1" marker-end="url(#go)" stroke-dasharray="3,2"/>

  <!-- Operator -->
  <rect x="170" y="140" width="280" height="60" rx="6" fill="#3b82f6"/>
  <text x="310" y="162" text-anchor="middle" fill="white" font-family="monospace" font-size="13" font-weight="bold">ArgoCD / Flux（Operator）</text>
  <text x="310" y="180" text-anchor="middle" fill="#bfdbfe" font-family="sans-serif" font-size="10">持续同步：对比期望状态 vs 实际状态</text>
  <text x="310" y="194" text-anchor="middle" fill="#bfdbfe" font-family="sans-serif" font-size="10">拉取模式（Pull） · 偏差自动修正（Self-Heal）</text>

  <line x1="310" y1="200" x2="310" y2="235" stroke="#64748b" stroke-width="1.5" marker-end="url(#go)"/>
  <text x="325" y="222" fill="#22c55e" font-family="sans-serif" font-size="10">持续同步 ↓</text>

  <!-- K8s -->
  <rect x="150" y="240" width="320" height="55" rx="6" fill="#22c55e"/>
  <text x="310" y="263" text-anchor="middle" fill="white" font-family="monospace" font-size="13" font-weight="bold">Kubernetes 集群（实际状态）</text>
  <text x="310" y="281" text-anchor="middle" fill="white" font-family="sans-serif" font-size="10">Pod × 5 ← Git 中 replicas: 5 自动调整为 5 个 Pod</text>

  <!-- Feedback -->
  <line x1="500" y1="267" x2="560" y2="267" stroke="#64748b" stroke-width="1.2"/>
  <line x1="560" y1="267" x2="560" y2="72" stroke="#64748b" stroke-width="1.2" stroke-dasharray="4,3"/>
  <line x1="560" y1="72" x2="430" y2="72" stroke="#64748b" stroke-width="1.2" marker-end="url(#go)" stroke-dasharray="4,3"/>
  <text x="560" y="258" text-anchor="middle" fill="#94a3b8" font-family="sans-serif" font-size="9">反馈差异</text>

  <!-- Principles -->
  <text x="20" y="325" fill="#1e40af" font-family="sans-serif" font-size="10" font-weight="bold">原则：</text>
  <text x="75" y="325" fill="#475569" font-family="sans-serif" font-size="10">声明式 · 版本化 · 自动同步 · 拉取模式</text>
</svg>
