<svg width="980" height="560" viewBox="0 0 980 560" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="980" y2="560" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFF7ED"/>
      <stop offset="1" stop-color="#EFF6FF"/>
    </linearGradient>
    <linearGradient id="orange" x1="0" y1="0" x2="0" y2="1">
      <stop stop-color="#F97316"/>
      <stop offset="1" stop-color="#FDBA74"/>
    </linearGradient>
    <linearGradient id="blue" x1="0" y1="0" x2="0" y2="1">
      <stop stop-color="#0EA5E9"/>
      <stop offset="1" stop-color="#7DD3FC"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="12" flood-color="#64748B" flood-opacity="0.18"/>
    </filter>
    <style>
      .title { font: 700 28px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif; fill: #0F172A; }
      .text { font: 500 18px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif; fill: #334155; }
      .small { font: 500 16px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif; fill: #475569; }
      .label { font: 700 15px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif; fill: #0F172A; }
      .pill { font: 700 14px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif; fill: white; }
    </style>
  </defs>

  <rect width="980" height="560" rx="28" fill="url(#bg)"/>
  <text x="46" y="62" class="title">Helm 工作流程</text>
  <text x="46" y="94" class="text">Chart + values + Release 元信息渲染出最终 YAML，再由 Kubernetes 创建和维护资源。</text>

  <rect x="48" y="142" width="222" height="316" rx="24" fill="white" filter="url(#shadow)"/>
  <rect x="78" y="172" width="110" height="30" rx="15" fill="url(#orange)"/>
  <text x="113" y="192" class="pill">Repository</text>
  <text x="78" y="230" class="text">Chart 仓库</text>
  <text x="78" y="260" class="small">bitnami/nginx</text>
  <text x="78" y="286" class="small">myapp-1.2.3.tgz</text>
  <rect x="78" y="322" width="150" height="34" rx="17" fill="#FFEDD5"/>
  <text x="100" y="344" class="label">helm repo add / search</text>

  <rect x="378" y="142" width="222" height="316" rx="24" fill="white" filter="url(#shadow)"/>
  <rect x="408" y="172" width="72" height="30" rx="15" fill="url(#blue)"/>
  <text x="429" y="192" class="pill">Chart</text>
  <text x="408" y="230" class="text">模板与默认值</text>
  <text x="408" y="260" class="small">Chart.yaml</text>
  <text x="408" y="286" class="small">values.yaml</text>
  <text x="408" y="312" class="small">templates/*.yaml</text>
  <rect x="408" y="348" width="150" height="34" rx="17" fill="#E0F2FE"/>
  <text x="428" y="370" class="label">helm show / template</text>

  <rect x="708" y="142" width="222" height="316" rx="24" fill="white" filter="url(#shadow)"/>
  <rect x="738" y="172" width="84" height="30" rx="15" fill="url(#orange)"/>
  <text x="764" y="192" class="pill">Release</text>
  <text x="738" y="230" class="text">集群中的安装实例</text>
  <text x="738" y="260" class="small">helm install web ...</text>
  <text x="738" y="286" class="small">revision 1, 2, 3...</text>
  <text x="738" y="312" class="small">upgrade / rollback</text>
  <rect x="738" y="348" width="150" height="34" rx="17" fill="#FFEDD5"/>
  <text x="761" y="370" class="label">可追踪、可回滚</text>

  <path d="M270 300H378" stroke="#F97316" stroke-width="4" stroke-linecap="round"/>
  <path d="M362 290L378 300L362 310" stroke="#F97316" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M600 300H708" stroke="#0EA5E9" stroke-width="4" stroke-linecap="round"/>
  <path d="M692 290L708 300L692 310" stroke="#0EA5E9" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>

  <rect x="320" y="470" width="340" height="44" rx="22" fill="#0F172A"/>
  <text x="357" y="498" class="pill">最终输出：Deployment / Service / Ingress / Secret ...</text>
</svg>
