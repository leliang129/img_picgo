<svg viewBox="0 0 480 400" xmlns="http://www.w3.org/2000/svg" style="max-width:100%;height:auto;">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#2563EB"/></marker>
  </defs>

  <!-- Node 1: 触发 -->
  <rect x="140" y="10" width="200" height="40" rx="10" fill="#DBEAFE" stroke="#93C5FD" stroke-width="1.5"/>
  <text x="240" y="35" text-anchor="middle" font-size="13" font-weight="700" fill="#1E40AF">用户触发构建</text>
  <line x1="240" y1="50" x2="240" y2="70" stroke="#2563EB" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Node 2 -->
  <rect x="140" y="75" width="200" height="40" rx="10" fill="#DBEAFE" stroke="#93C5FD" stroke-width="1.5"/>
  <text x="240" y="100" text-anchor="middle" font-size="13" font-weight="700" fill="#1E40AF">Jenkins Master 解析 Job</text>
  <line x1="240" y1="115" x2="240" y2="135" stroke="#2563EB" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Node 3 -->
  <rect x="140" y="140" width="200" height="40" rx="10" fill="#FEF3C7" stroke="#FCD34D" stroke-width="1.5"/>
  <text x="240" y="165" text-anchor="middle" font-size="13" font-weight="700" fill="#92400E">加入 Queue 等待 Agent</text>
  <line x1="240" y1="180" x2="240" y2="200" stroke="#2563EB" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Node 4 -->
  <rect x="140" y="205" width="200" height="40" rx="10" fill="#DBEAFE" stroke="#93C5FD" stroke-width="1.5"/>
  <text x="240" y="230" text-anchor="middle" font-size="13" font-weight="700" fill="#1E40AF">Master 分发 Job → Agent</text>
  <line x1="240" y1="245" x2="240" y2="265" stroke="#2563EB" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Node 5: Steps -->
  <rect x="80" y="270" width="320" height="75" rx="10" fill="#F0FDF4" stroke="#86EFAC" stroke-width="1.5"/>
  <text x="240" y="292" text-anchor="middle" font-size="13" font-weight="700" fill="#166534">Agent 执行 Steps</text>
  <text x="240" y="312" text-anchor="middle" font-size="11" fill="#64748B">① SCM Checkout  →  ② Build  →  ③ Deploy</text>
  <text x="240" y="330" text-anchor="middle" font-size="11" fill="#64748B">拉取代码            编译打包          归档部署</text>
  <line x1="240" y1="345" x2="240" y2="365" stroke="#2563EB" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Node 6 -->
  <rect x="120" y="370" width="240" height="24" rx="6" fill="#E2E8F0" stroke="#CBD5E1" stroke-width="1"/>
  <text x="240" y="387" text-anchor="middle" font-size="12" font-weight="700" fill="#475569">Agent 上报 → Master 持久化</text>
</svg>
