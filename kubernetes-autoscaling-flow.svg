<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="620" viewBox="0 0 1200 620" role="img" aria-labelledby="title desc">
  <title id="title">Kubernetes 自动扩缩容流程</title>
  <desc id="desc">Metrics Server、HPA、VPA 和 Cluster Autoscaler 如何根据指标调整副本、资源和节点。</desc>
  <defs><marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M0 0 10 5 0 10z" fill="#475569"/></marker><style>.bg{fill:#f8fafc}.b{fill:#fff;stroke:#94a3b8;stroke-width:1.5}.blue{fill:#dbeafe;stroke:#60a5fa}.green{fill:#dcfce7;stroke:#4ade80}.amber{fill:#fef3c7;stroke:#fbbf24}.violet{fill:#ede9fe;stroke:#a78bfa}.t{font-family:Arial,Helvetica,sans-serif;fill:#0f172a}.h{font-size:28px;font-weight:700}.l{font-size:17px;font-weight:700}.s{font-size:14px}.xs{font-size:12px;fill:#475569}.a{stroke:#475569;stroke-width:2;fill:none;marker-end:url(#arrow)}.d{stroke-dasharray:7 6}</style></defs>
  <rect class="bg" width="1200" height="620"/>
  <text class="t h" x="48" y="56">自动扩缩容流程</text>
  <text class="t s" x="48" y="84">HPA 调副本，VPA 给资源建议，Cluster Autoscaler 调节点容量。</text>
  <rect class="blue b" x="80" y="190" width="190" height="90" rx="10"/><text class="t l" x="126" y="226">Metrics API</text><text class="t xs" x="124" y="250">CPU / Memory / Custom</text>
  <rect class="amber b" x="390" y="120" width="180" height="80" rx="10"/><text class="t l" x="458" y="154">HPA</text><text class="t xs" x="426" y="176">调整 replicas</text>
  <rect class="violet b" x="390" y="270" width="180" height="80" rx="10"/><text class="t l" x="458" y="304">VPA</text><text class="t xs" x="418" y="326">建议 requests / limits</text>
  <rect class="green b" x="720" y="120" width="190" height="80" rx="10"/><text class="t l" x="762" y="154">Deployment</text><text class="t xs" x="770" y="176">Pod 副本数</text>
  <rect class="green b" x="720" y="270" width="190" height="80" rx="10"/><text class="t l" x="784" y="304">Pod</text><text class="t xs" x="770" y="326">资源配置</text>
  <rect class="amber b" x="390" y="430" width="230" height="80" rx="10"/><text class="t l" x="430" y="464">Cluster Autoscaler</text><text class="t xs" x="444" y="486">根据 Pending Pod 扩节点</text>
  <rect class="green b" x="760" y="430" width="190" height="80" rx="10"/><text class="t l" x="800" y="464">Node Group</text><text class="t xs" x="806" y="486">节点数量</text>
  <path class="a" d="M270 235c70 0 70-70 120-78"/><path class="a" d="M270 235c70 0 70 70 120 76"/><path class="a" d="M570 160h150"/><path class="a" d="M570 310h150"/><path class="a d" d="M815 350c0 70-90 90-195 110"/><path class="a" d="M620 470h140"/>
</svg>
