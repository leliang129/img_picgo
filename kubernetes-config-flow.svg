<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="620" viewBox="0 0 1200 620" role="img" aria-labelledby="title desc">
  <title id="title">Kubernetes configuration delivery flow</title>
  <desc id="desc">A flow showing ConfigMap and Secret being referenced by Deployment, injected into Pods through environment variables and volumes, then requiring rollout restart or controller reconciliation for application updates.</desc>
  <defs>
    <style>
      .bg { fill: #f8fafc; }
      .box { fill: #ffffff; stroke: #94a3b8; stroke-width: 1.5; }
      .blue { fill: #dbeafe; stroke: #60a5fa; stroke-width: 1.5; }
      .green { fill: #dcfce7; stroke: #4ade80; stroke-width: 1.5; }
      .amber { fill: #fef3c7; stroke: #fbbf24; stroke-width: 1.5; }
      .red { fill: #fee2e2; stroke: #f87171; stroke-width: 1.5; }
      .text { font-family: Arial, Helvetica, sans-serif; fill: #0f172a; }
      .title { font-size: 26px; font-weight: 700; }
      .label { font-size: 17px; font-weight: 700; }
      .small { font-size: 14px; }
      .tiny { font-size: 12px; fill: #475569; }
      .arrow { stroke: #475569; stroke-width: 2; fill: none; marker-end: url(#arrow); }
      .dash { stroke-dasharray: 7 6; }
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#475569" />
    </marker>
  </defs>
  <rect class="bg" width="1200" height="620" />
  <text class="text title" x="48" y="54">配置管理流程</text>
  <text class="text small" x="48" y="82">ConfigMap 保存普通配置，Secret 保存敏感配置；Pod 通过环境变量或 Volume 使用配置。</text>

  <rect class="blue" x="70" y="140" width="210" height="96" rx="8" />
  <text class="text label" x="114" y="176">ConfigMap</text>
  <text class="text tiny" x="104" y="202">普通配置 / 开关 / 文件</text>

  <rect class="red" x="70" y="304" width="210" height="96" rx="8" />
  <text class="text label" x="132" y="340">Secret</text>
  <text class="text tiny" x="103" y="366">密码 / Token / 证书</text>

  <rect class="box" x="390" y="132" width="220" height="118" rx="8" />
  <text class="text label" x="450" y="169">Deployment</text>
  <text class="text tiny" x="432" y="198">env / envFrom / volumes</text>
  <text class="text tiny" x="451" y="220">声明配置引用关系</text>

  <rect class="green" x="720" y="100" width="360" height="340" rx="8" />
  <text class="text label" x="750" y="138">Pod</text>
  <rect class="box" x="760" y="172" width="130" height="70" rx="6" />
  <text class="text small" x="785" y="201">Env Vars</text>
  <text class="text tiny" x="784" y="220">启动时注入</text>
  <rect class="box" x="920" y="172" width="130" height="70" rx="6" />
  <text class="text small" x="951" y="201">Volume</text>
  <text class="text tiny" x="941" y="220">文件形式挂载</text>
  <rect class="box" x="800" y="300" width="210" height="70" rx="6" />
  <text class="text small" x="858" y="329">Container</text>
  <text class="text tiny" x="835" y="348">读取环境变量或配置文件</text>

  <rect class="amber" x="390" y="350" width="220" height="96" rx="8" />
  <text class="text label" x="436" y="386">配置变更</text>
  <text class="text tiny" x="426" y="412">更新对象后触发发布</text>

  <rect class="amber" x="720" y="490" width="360" height="70" rx="8" />
  <text class="text label" x="790" y="523">rollout restart / 重新发布</text>
  <text class="text tiny" x="804" y="544">确保应用加载最新配置</text>

  <path class="arrow" d="M 280 188 L 390 188" />
  <path class="arrow" d="M 280 352 C 330 352 340 214 390 214" />
  <path class="arrow" d="M 610 190 L 720 190" />
  <path class="arrow" d="M 890 242 L 876 300" />
  <path class="arrow" d="M 986 242 L 944 300" />
  <path class="arrow dash" d="M 500 250 L 500 350" />
  <path class="arrow" d="M 610 398 C 700 398 710 524 720 524" />
  <path class="arrow dash" d="M 900 490 L 900 440" />
</svg>
