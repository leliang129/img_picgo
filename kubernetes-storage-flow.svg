<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="620" viewBox="0 0 1200 620" role="img" aria-labelledby="title desc">
  <title id="title">Kubernetes 存储绑定流程</title>
  <desc id="desc">StorageClass、PVC、CSI Provisioner、PV 和 Pod 挂载之间的关系。</desc>
  <defs><marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M0 0 10 5 0 10z" fill="#475569"/></marker><style>.bg{fill:#f8fafc}.b{fill:#fff;stroke:#94a3b8;stroke-width:1.5}.blue{fill:#dbeafe;stroke:#60a5fa}.green{fill:#dcfce7;stroke:#4ade80}.amber{fill:#fef3c7;stroke:#fbbf24}.violet{fill:#ede9fe;stroke:#a78bfa}.t{font-family:Arial,Helvetica,sans-serif;fill:#0f172a}.h{font-size:28px;font-weight:700}.l{font-size:17px;font-weight:700}.s{font-size:14px}.xs{font-size:12px;fill:#475569}.a{stroke:#475569;stroke-width:2;fill:none;marker-end:url(#arrow)}</style></defs>
  <rect class="bg" width="1200" height="620"/>
  <text class="t h" x="48" y="56">存储绑定流程</text>
  <text class="t s" x="48" y="84">应用申请 PVC，CSI 根据 StorageClass 创建 PV，Pod 再挂载 PVC 使用存储。</text>
  <rect class="blue b" x="80" y="160" width="180" height="76" rx="10"/><text class="t l" x="122" y="194">StorageClass</text><text class="t xs" x="126" y="216">供给模板</text>
  <rect class="amber b" x="80" y="340" width="180" height="76" rx="10"/><text class="t l" x="150" y="374">PVC</text><text class="t xs" x="122" y="396">存储申请</text>
  <rect class="violet b" x="390" y="250" width="220" height="90" rx="10"/><text class="t l" x="438" y="286">CSI Provisioner</text><text class="t xs" x="436" y="312">动态创建卷和 PV</text>
  <rect class="green b" x="740" y="250" width="170" height="90" rx="10"/><text class="t l" x="800" y="286">PV</text><text class="t xs" x="778" y="312">集群存储资源</text>
  <rect class="green b" x="980" y="250" width="160" height="90" rx="10"/><text class="t l" x="1044" y="286">Pod</text><text class="t xs" x="1014" y="312">VolumeMount</text>
  <path class="a" d="M260 198c100 0 100 70 130 92"/><path class="a" d="M260 378c100 0 100-70 130-82"/><path class="a" d="M610 295h130"/><path class="a" d="M910 295h70"/>
</svg>
