<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="620" viewBox="0 0 1200 620" role="img" aria-labelledby="title desc">
  <title id="title">Kubernetes kubeadm 升级流程</title>
  <desc id="desc">Kubernetes 集群升级从检查和备份开始，依次升级控制平面、工作节点并做验证。</desc>
  <defs><marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M0 0 10 5 0 10z" fill="#475569"/></marker><style>.bg{fill:#f8fafc}.b{fill:#fff;stroke:#94a3b8;stroke-width:1.5}.blue{fill:#dbeafe;stroke:#60a5fa}.green{fill:#dcfce7;stroke:#4ade80}.amber{fill:#fef3c7;stroke:#fbbf24}.red{fill:#fee2e2;stroke:#f87171}.t{font-family:Arial,Helvetica,sans-serif;fill:#0f172a}.h{font-size:28px;font-weight:700}.l{font-size:16px;font-weight:700}.s{font-size:14px}.xs{font-size:12px;fill:#475569}.a{stroke:#475569;stroke-width:2;fill:none;marker-end:url(#arrow)}</style></defs>
  <rect class="bg" width="1200" height="620"/>
  <text class="t h" x="48" y="56">kubeadm 集群升级流程</text>
  <text class="t s" x="48" y="84">先检查和备份，再升级控制平面，随后滚动升级 Worker，最后验证业务链路。</text>
  <rect class="blue b" x="70" y="220" width="150" height="88" rx="10"/><text class="t l" x="112" y="252">检查</text><text class="t xs" x="100" y="276">版本 / 插件</text>
  <rect class="red b" x="270" y="220" width="150" height="88" rx="10"/><text class="t l" x="314" y="252">备份</text><text class="t xs" x="308" y="276">etcd / 配置</text>
  <rect class="amber b" x="470" y="220" width="170" height="88" rx="10"/><text class="t l" x="506" y="252">控制平面</text><text class="t xs" x="506" y="276">kubeadm apply</text>
  <rect class="amber b" x="700" y="220" width="170" height="88" rx="10"/><text class="t l" x="744" y="252">Worker</text><text class="t xs" x="732" y="276">drain / upgrade</text>
  <rect class="green b" x="930" y="220" width="170" height="88" rx="10"/><text class="t l" x="974" y="252">验证</text><text class="t xs" x="960" y="276">插件 / 业务链路</text>
  <rect class="b" x="470" y="390" width="400" height="78" rx="10"/><text class="t l" x="586" y="424">异常处理 / 回滚预案</text><text class="t xs" x="550" y="448">保留现场，按备份和快照恢复，不盲目 reset</text>
  <path class="a" d="M220 264h50"/><path class="a" d="M420 264h50"/><path class="a" d="M640 264h60"/><path class="a" d="M870 264h60"/><path class="a" d="M555 308v82"/><path class="a" d="M785 308v82"/>
</svg>
