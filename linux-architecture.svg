<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 580 300">
  <rect width="580" height="300" rx="8" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>

  <!-- Applications -->
  <rect x="40" y="15" width="500" height="40" rx="6" fill="#3b82f6" opacity="0.8"/>
  <text x="290" y="40" text-anchor="middle" fill="white" font-family="sans-serif" font-size="14" font-weight="bold">应用程序</text>

  <!-- Shell & Tools -->
  <rect x="40" y="70" width="500" height="40" rx="6" fill="#60a5fa" opacity="0.75"/>
  <text x="290" y="95" text-anchor="middle" fill="white" font-family="sans-serif" font-size="13">Shell / 系统工具（GNU Coreutils · bash · systemd）</text>

  <!-- Kernel -->
  <rect x="40" y="125" width="500" height="45" rx="6" fill="#2563eb"/>
  <text x="290" y="146" text-anchor="middle" fill="white" font-family="sans-serif" font-size="13" font-weight="bold">Linux 内核</text>
  <text x="290" y="162" text-anchor="middle" fill="#bfdbfe" font-family="sans-serif" font-size="10">进程调度 · 内存管理 · 网络栈 · 文件系统 · 设备驱动</text>

  <!-- Hardware -->
  <rect x="40" y="185" width="500" height="35" rx="6" fill="#1e293b"/>
  <text x="290" y="207" text-anchor="middle" fill="#94a3b8" font-family="sans-serif" font-size="13">硬件（CPU · 内存 · 磁盘 · 网卡）</text>

  <!-- Kernel subsystems -->
  <text x="40" y="255" fill="#64748b" font-family="sans-serif" font-size="11">内核子系统：</text>
  <rect x="40" y="265" width="80" height="22" rx="4" fill="#dbeafe"/>
  <text x="80" y="281" text-anchor="middle" fill="#1e40af" font-family="sans-serif" font-size="10">进程管理</text>
  <rect x="128" y="265" width="80" height="22" rx="4" fill="#dbeafe"/>
  <text x="168" y="281" text-anchor="middle" fill="#1e40af" font-family="sans-serif" font-size="10">内存管理</text>
  <rect x="216" y="265" width="80" height="22" rx="4" fill="#dbeafe"/>
  <text x="256" y="281" text-anchor="middle" fill="#1e40af" font-family="sans-serif" font-size="10">文件系统</text>
  <rect x="304" y="265" width="80" height="22" rx="4" fill="#dbeafe"/>
  <text x="344" y="281" text-anchor="middle" fill="#1e40af" font-family="sans-serif" font-size="10">网络栈</text>
  <rect x="392" y="265" width="80" height="22" rx="4" fill="#dbeafe"/>
  <text x="432" y="281" text-anchor="middle" fill="#1e40af" font-family="sans-serif" font-size="10">设备驱动</text>
</svg>
