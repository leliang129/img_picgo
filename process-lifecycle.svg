<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 200">
  <defs>
    <marker id="pa" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,1 L9,5 L0,9" fill="#64748b"/>
    </marker>
  </defs>
  <rect width="680" height="200" rx="8" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
  <text x="340" y="28" text-anchor="middle" fill="#334155" font-family="sans-serif" font-size="15" font-weight="bold">Linux 进程生命周期</text>

  <!-- fork -->
  <rect x="15" y="55" width="75" height="36" rx="6" fill="#a78bfa" opacity="0.8"/>
  <text x="52" y="78" text-anchor="middle" fill="white" font-family="monospace" font-size="12" font-weight="bold">fork()</text>

  <line x1="90" y1="73" x2="130" y2="73" stroke="#64748b" stroke-width="1.5" marker-end="url(#pa)"/>

  <!-- exec -->
  <rect x="135" y="55" width="80" height="36" rx="6" fill="#8b5cf6" opacity="0.8"/>
  <text x="175" y="78" text-anchor="middle" fill="white" font-family="monospace" font-size="12" font-weight="bold">exec()</text>

  <line x1="215" y1="73" x2="265" y2="73" stroke="#64748b" stroke-width="1.5" marker-end="url(#pa)"/>

  <!-- running -->
  <rect x="270" y="55" width="85" height="36" rx="6" fill="#22c55e"/>
  <text x="312" y="78" text-anchor="middle" fill="white" font-family="sans-serif" font-size="12" font-weight="bold">running</text>

  <!-- preempted loop -->
  <line x1="355" y1="65" x2="355" y2="40" stroke="#64748b" stroke-width="1.2" stroke-dasharray="4,3"/>
  <line x1="355" y1="40" x2="312" y2="40" stroke="#64748b" stroke-width="1.2" stroke-dasharray="4,3"/>
  <line x1="312" y1="40" x2="312" y2="55" stroke="#64748b" stroke-width="1.2" marker-end="url(#pa)" stroke-dasharray="4,3"/>
  <text x="333" y="35" text-anchor="middle" fill="#64748b" font-family="sans-serif" font-size="9">抢占</text>

  <!-- waiting -->
  <line x1="355" y1="73" x2="410" y2="73" stroke="#64748b" stroke-width="1.5" marker-end="url(#pa)"/>
  <rect x="415" y="55" width="85" height="36" rx="6" fill="#f59e0b" opacity="0.8"/>
  <text x="457" y="78" text-anchor="middle" fill="white" font-family="sans-serif" font-size="12" font-weight="bold">waiting</text>
  <text x="457" y="105" text-anchor="middle" fill="#64748b" font-family="sans-serif" font-size="10">等 I/O / 信号</text>

  <!-- waiting back to running -->
  <line x1="457" y1="91" x2="457" y2="125" stroke="#64748b" stroke-width="1.2" stroke-dasharray="4,3"/>
  <line x1="457" y1="125" x2="312" y2="125" stroke="#64748b" stroke-width="1.2" stroke-dasharray="4,3"/>
  <line x1="312" y1="125" x2="312" y2="91" stroke="#64748b" stroke-width="1.2" marker-end="url(#pa)" stroke-dasharray="4,3"/>

  <!-- zombie -->
  <line x1="500" y1="73" x2="555" y2="73" stroke="#64748b" stroke-width="1.5" marker-end="url(#pa)"/>
  <rect x="560" y="55" width="80" height="36" rx="6" fill="#ef4444" opacity="0.75"/>
  <text x="600" y="78" text-anchor="middle" fill="white" font-family="sans-serif" font-size="12" font-weight="bold">zombie</text>

  <!-- exit -->
  <line x1="600" y1="91" x2="600" y2="170" stroke="#64748b" stroke-width="1.5" marker-end="url(#pa)"/>
  <rect x="555" y="170" width="90" height="32" rx="6" fill="#cbd5e1" stroke="#94a3b8" stroke-width="1"/>
  <text x="600" y="191" text-anchor="middle" fill="#475569" font-family="sans-serif" font-size="12">exit / 回收</text>

  <!-- annotations -->
  <text x="95" y="143" fill="#64748b" font-family="sans-serif" font-size="10">父进程 fork() 克隆自身</text>
  <text x="175" y="155" fill="#64748b" font-family="sans-serif" font-size="10">exec() 加载新程序</text>
  <text x="312" y="145" fill="#64748b" font-family="sans-serif" font-size="10">占用 CPU 时间片</text>
  <text x="605" y="110" fill="#64748b" font-family="sans-serif" font-size="10">父进程 wait() 回收</text>
</svg>
