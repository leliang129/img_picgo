<svg width="1200" height="680" viewBox="0 0 1200 680" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="680" rx="28" fill="#F8FAFC"/>
  <text x="600" y="74" text-anchor="middle" fill="#0F172A" font-size="30" font-family="Arial, sans-serif" font-weight="700">Reconcile Loop</text>
  <text x="600" y="110" text-anchor="middle" fill="#475569" font-size="16" font-family="Arial, sans-serif">控制器持续比较期望状态与当前状态，不一致时就执行调谐</text>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0 0L10 5L0 10Z" fill="#FB923C"/>
    </marker>
  </defs>
  <rect x="120" y="180" width="220" height="92" rx="20" fill="#FFF7ED" stroke="#FDBA74" stroke-width="2"/>
  <text x="230" y="220" text-anchor="middle" fill="#9A3412" font-size="22" font-family="Arial, sans-serif" font-weight="700">期望状态</text>
  <text x="230" y="252" text-anchor="middle" fill="#7C2D12" font-size="15" font-family="Arial, sans-serif">来自 YAML / API 对象 spec</text>
  <rect x="490" y="180" width="220" height="92" rx="20" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="2"/>
  <text x="600" y="220" text-anchor="middle" fill="#0F172A" font-size="22" font-family="Arial, sans-serif" font-weight="700">当前状态</text>
  <text x="600" y="252" text-anchor="middle" fill="#475569" font-size="15" font-family="Arial, sans-serif">来自控制器观察到的资源现状</text>
  <rect x="860" y="180" width="220" height="92" rx="20" fill="#FFF7ED" stroke="#FDBA74" stroke-width="2"/>
  <text x="970" y="220" text-anchor="middle" fill="#9A3412" font-size="22" font-family="Arial, sans-serif" font-weight="700">对比差异</text>
  <text x="970" y="252" text-anchor="middle" fill="#7C2D12" font-size="15" font-family="Arial, sans-serif">是否需要创建 / 删除 / 更新</text>
  <path d="M340 226H490" stroke="#FB923C" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M710 226H860" stroke="#FB923C" stroke-width="4" marker-end="url(#arrow)"/>
  <rect x="420" y="370" width="360" height="110" rx="24" fill="#FFFFFF" stroke="#EA580C" stroke-width="3"/>
  <text x="600" y="415" text-anchor="middle" fill="#9A3412" font-size="24" font-family="Arial, sans-serif" font-weight="700">执行调谐</text>
  <text x="600" y="448" text-anchor="middle" fill="#7C2D12" font-size="16" font-family="Arial, sans-serif">创建 Pod、删除副本、调整 ReplicaSet 或更新状态</text>
  <path d="M970 272V330C970 352 952 370 930 370H780" stroke="#FB923C" stroke-width="4" fill="none" marker-end="url(#arrow)"/>
  <path d="M420 425H270C226 425 190 389 190 345V272" stroke="#FB923C" stroke-width="4" fill="none" marker-end="url(#arrow)"/>
  <rect x="400" y="560" width="400" height="60" rx="18" fill="#FFEDD5"/>
  <text x="600" y="598" text-anchor="middle" fill="#9A3412" font-size="18" font-family="Arial, sans-serif" font-weight="700">循环不会停止，只要状态偏移就会再次触发</text>
</svg>
