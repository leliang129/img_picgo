<svg viewBox="0 0 500 250" xmlns="http://www.w3.org/2000/svg" style="max-width:100%;height:auto;">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#2563EB"/></marker>
    <marker id="arr-green" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#16A34A"/></marker>
    <marker id="arr-orange" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#EA580C"/></marker>
  </defs>

  <!-- 客户端 -->
  <rect x="150" y="10" width="200" height="36" rx="10" fill="#F1F5F9" stroke="#CBD5E1" stroke-width="1.5"/>
  <text x="250" y="33" text-anchor="middle" font-size="14" font-weight="700" fill="#1E293B">客户端请求 Group URL</text>
  <line x1="250" y1="46" x2="250" y2="68" stroke="#2563EB" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Group -->
  <rect x="120" y="72" width="260" height="36" rx="10" fill="#DBEAFE" stroke="#93C5FD" stroke-width="1.5"/>
  <text x="250" y="95" text-anchor="middle" font-size="14" font-weight="700" fill="#1E40AF">Group 按顺序查询成员</text>

  <!-- 三个分支 -->
  <line x1="160" y1="108" x2="160" y2="130" stroke="#16A34A" stroke-width="2" marker-end="url(#arr-green)"/>
  <line x1="250" y1="108" x2="250" y2="130" stroke="#2563EB" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="340" y1="108" x2="340" y2="130" stroke="#EA580C" stroke-width="2" marker-end="url(#arr-orange)"/>

  <rect x="60" y="134" width="200" height="36" rx="8" fill="#F0FDF4" stroke="#86EFAC" stroke-width="1.5"/>
  <text x="160" y="157" text-anchor="middle" font-size="13" font-weight="700" fill="#166534">Hosted (releases)</text>

  <rect x="60" y="180" width="200" height="36" rx="8" fill="#F0FDF4" stroke="#86EFAC" stroke-width="1.5"/>
  <text x="160" y="203" text-anchor="middle" font-size="13" font-weight="700" fill="#166534">Hosted (snapshots)</text>

  <rect x="290" y="157" width="180" height="36" rx="8" fill="#FEF3C7" stroke="#FCD34D" stroke-width="1.5"/>
  <text x="380" y="180" text-anchor="middle" font-size="13" font-weight="700" fill="#92400E">Proxy (central)</text>

  <!-- 标注 -->
  <text x="160" y="232" text-anchor="middle" font-size="11" fill="#16A34A">① 先查本地仓库</text>
  <text x="250" y="232" text-anchor="middle" font-size="11" fill="#64748B">② 按 Group 顺序连续查询</text>
  <text x="380" y="232" text-anchor="middle" font-size="11" fill="#EA580C">③ 未命中时代理远程</text>
</svg>
