    <text x="1000" y="554" text-anchor="middle" fill="#9A3412" font-size="16" font-family="Arial, sans-serif">web-1.nginx.default.svc</text>
    <rect x="940" y="584" width="120" height="30" rx="10" fill="#FED7AA"/>
    <text x="1000" y="604" text-anchor="middle" fill="#7C2D12" font-size="15" font-family="Arial, sans-serif">PVC: www-web-1</text>
  </g>
