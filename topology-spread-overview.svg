<svg width="980" height="560" viewBox="0 0 980 560" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="980" y2="560" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFF7ED"/>
      <stop offset="1" stop-color="#EFF6FF"/>
    </linearGradient>
    <linearGradient id="zoneA" x1="0" y1="0" x2="0" y2="1">
      <stop stop-color="#FB923C"/>
      <stop offset="1" stop-color="#FDBA74"/>
    </linearGradient>
    <linearGradient id="zoneB" x1="0" y1="0" x2="0" y2="1">
      <stop stop-color="#38BDF8"/>
      <stop offset="1" stop-color="#7DD3FC"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="12" flood-color="#64748B" flood-opacity="0.18"/>
    </filter>
    <style>
      .title { font: 700 28px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif; fill: #0F172A; }
      .text { font: 500 18px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif; fill: #334155; }
      .small { font: 500 16px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif; fill: #475569; }
      .label { font: 700 15px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif; fill: #0F172A; }
      .pill { font: 700 14px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif; fill: white; }
    </style>
  </defs>

  <rect width="980" height="560" rx="28" fill="url(#bg)"/>
  <text x="48" y="64" class="title">PodTopologySpread</text>
  <text x="48" y="96" class="text">按 topologyKey 划分拓扑域，统计同类 Pod 数量，再让新 Pod 尽量落到更“空”的域。</text>

  <rect x="42" y="138" width="896" height="356" rx="24" fill="white" filter="url(#shadow)"/>

  <rect x="82" y="182" width="340" height="258" rx="22" fill="#FFF7ED" stroke="#FDBA74" stroke-width="2"/>
  <rect x="104" y="202" width="108" height="30" rx="15" fill="url(#zoneA)"/>
  <text x="136" y="222" class="pill">zone-a</text>
  <text x="104" y="252" class="small">已有 app=web Pod：3</text>

  <rect x="112" y="278" width="86" height="44" rx="14" fill="#F97316" fill-opacity="0.14" stroke="#F97316"/>
  <text x="136" y="305" class="label">web-1</text>
  <rect x="214" y="278" width="86" height="44" rx="14" fill="#F97316" fill-opacity="0.14" stroke="#F97316"/>
  <text x="238" y="305" class="label">web-2</text>
  <rect x="316" y="278" width="86" height="44" rx="14" fill="#F97316" fill-opacity="0.14" stroke="#F97316"/>
  <text x="340" y="305" class="label">web-3</text>

  <rect x="558" y="182" width="340" height="258" rx="22" fill="#EFF6FF" stroke="#7DD3FC" stroke-width="2"/>
  <rect x="580" y="202" width="108" height="30" rx="15" fill="url(#zoneB)"/>
  <text x="612" y="222" class="pill">zone-b</text>
  <text x="580" y="252" class="small">已有 app=web Pod：1</text>

  <rect x="588" y="278" width="86" height="44" rx="14" fill="#0EA5E9" fill-opacity="0.14" stroke="#0EA5E9"/>
  <text x="612" y="305" class="label">web-4</text>
  <rect x="690" y="278" width="118" height="44" rx="14" fill="#0EA5E9"/>
  <text x="717" y="305" class="pill">new Pod</text>

  <path d="M422 309H554" stroke="#0EA5E9" stroke-width="4" stroke-dasharray="10 10" stroke-linecap="round"/>
  <path d="M542 299L558 309L542 319" stroke="#0EA5E9" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>

  <rect x="112" y="352" width="206" height="34" rx="17" fill="#FFEDD5"/>
  <text x="128" y="374" class="label">maxSkew = 1 时不应继续放这里</text>

  <rect x="580" y="352" width="218" height="34" rx="17" fill="#E0F2FE"/>
  <text x="598" y="374" class="label">优先补到数量更少的拓扑域</text>

  <rect x="84" y="458" width="270" height="24" rx="12" fill="#F97316" fill-opacity="0.18"/>
  <text x="100" y="475" class="small">统计维度：labelSelector = app=web</text>
  <rect x="382" y="458" width="240" height="24" rx="12" fill="#0EA5E9" fill-opacity="0.16"/>
  <text x="398" y="475" class="small">划分维度：topologyKey = zone</text>
  <rect x="650" y="458" width="224" height="24" rx="12" fill="#94A3B8" fill-opacity="0.16"/>
  <text x="666" y="475" class="small">策略：DoNotSchedule / ScheduleAnyway</text>
</svg>
